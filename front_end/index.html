<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DragonDex</title>
    
    <link rel="icon" type="image/png" href="logo_berk.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de Entrada (Capa/Bardo) -->
    <div id="telaEntrada">
        <h1>Bem-vindo a Berk</h1>
        <p>Prepare-se para consultar os registros antigos.</p>
        <button id="btnEntrar">Abrir DragonDex</button>
    </div>

    <!-- O contêiner principal (o pergaminho) -->
    <div class="container">
        
        <div class="cabecalho-dex">
            <img src="logo_berk.png" alt="Brasão de Berk" id="logoBerk">
            <h1>DragonDex</h1>
        </div>

        <p>Apresente a ilustração da fera para consultar os antigos registros de Berk.</p>

        <!-- Formulário adicionado com o ID correto que o JS procura -->
        <form id="form-dragao">
            <label for="imagem-input" class="custom-file-upload">
                Selecionar Pergaminho
            </label>
            <input type="file" id="imagem-input" accept="image/*">

            <button type="submit">Identificar Espécie</button>
        </form>

        <!-- Área de resultados que o JS manipula -->
        <div id="resultado-container" style="display: none;">
            <img id="preview-imagem" alt="Prévia do Dragão">
            <div id="texto-resultado"></div>
        </div>

    </div>

    <!-- O painel do tocador de música -->
    <div class="controles-som">
        <button id="btnMusica">🔊 Tocar Música</button>
        <input type="range" id="volumeMusica" min="0" max="1" step="0.1" value="0.3">
    </div>

    <audio id="musicaFundo" loop>
        <source src="tema_dragao.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
